<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JONAH OSKOW — Film & Commercial Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111;
    --text: #fff;
    --accent: #44aaff;
    --muted: rgba(255,255,255,0.25);
    --left-w: 38vw;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  /* OPT-NAV */
  .opt-nav {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 6px 16px;
  border-radius: 999px;
  backdrop-filter: blur(8px);
}
.opt-nav a {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
  transition: color 0.2s;
  font-family: sans-serif;
}
.opt-nav a:hover { color: #fff; }
.opt-nav .opt-label {
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  letter-spacing: 0.1em;
  white-space: nowrap;
  font-family: sans-serif;
}

  /* LAYOUT */
  .site-layout {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    width: var(--left-w);
    min-width: 280px;
    flex-shrink: 0;
    background: var(--bg);
    border-right: 1px solid rgba(255,255,255,0.08);
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 52px 40px;
    z-index: 20;
  }

  .name-block { margin-bottom: 20px; }
  .name-block .first {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2.2rem, 3.8vw, 3.4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .name-block .last {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2.2rem, 3.8vw, 3.4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--accent);
  }
  .role {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 12px;
    margin-bottom: 6px;
  }
  .email-link {
    font-size: 0.72rem;
    color: var(--muted);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    transition: color 0.2s;
  }
  .email-link:hover { color: var(--accent); }

  /* LEFT NAV — category links */
  .left-nav {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .left-nav-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 0;
    border-left: 2px solid transparent;
    padding-left: 12px;
    transition: color 0.2s, border-color 0.2s;
    text-decoration: none;
  }
  .left-nav-link:hover { color: var(--text); }
  .left-nav-link.active { color: var(--accent); border-left-color: var(--accent); }

  .spokesman-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 32px;
    margin-bottom: 8px;
  }
  .spokesman-thumb {
    position: relative;
    width: 100%;
    max-width: 300px;
    aspect-ratio: 16/9;
    background: #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    transition: border-color 0.2s;
  }
  .spokesman-thumb:hover { border-color: var(--accent); }
  .spokesman-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.45; }
  .play-circle {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .play-circle svg { width: 44px; height: 44px; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.7)); }

  .left-footer {
    margin-top: auto;
    font-size: 0.6rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    line-height: 1.7;
  }

  /* RIGHT PANEL — scrollable */
  .right-panel {
    margin-left: var(--left-w);
    flex: 1;
    height: 100vh;
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* CATEGORY SECTION */
  .cat-section {
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .cat-sticky-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding: 28px 48px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }
  .cat-index-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .cat-section-name {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    transition: color 0.3s;
  }
  .cat-section.in-view .cat-section-name { color: var(--accent); }

  .cat-body {
    flex: 1;
    padding: 32px 48px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* SECTION PLAYER */
  .section-player-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #0a0a0a;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .section-video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  .section-player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0,0,0,0.5);
    transition: opacity 0.35s;
  }
  .section-player-overlay.hidden { opacity: 0; pointer-events: none; }
  .section-player-overlay .ov-arrow { font-size: 1.5rem; color: var(--muted); }
  .section-player-overlay p {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* THUMBNAIL STRIP */
  .thumb-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
    padding-bottom: 6px;
  }
  .thumb-strip::-webkit-scrollbar { height: 3px; }
  .thumb-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .strip-thumb {
    flex-shrink: 0;
    width: 160px;
    aspect-ratio: 16/9;
    background: #1c1c1c;
    border-radius: 3px;
    scroll-snap-align: start;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .strip-thumb:hover { transform: scale(1.04); }
  .strip-thumb.active { border-color: var(--accent); }

  .strip-thumb-play {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .strip-thumb-play svg { width: 22px; height: 22px; opacity: 0.6; transition: opacity 0.2s; }
  .strip-thumb:hover .strip-thumb-play svg { opacity: 1; }
  .strip-thumb.active .strip-thumb-play svg { opacity: 0.3; }

  .strip-thumb-num {
    position: absolute;
    bottom: 5px;
    left: 7px;
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    color: rgba(255,255,255,0.4);
  }

  /* ABOUT SECTION */
  .about-section {
    min-height: 100vh;
    background: #0c0c0c;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 80px 48px;
  }

  .about-inner {
    display: flex;
    gap: 80px;
    align-items: flex-start;
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
  }

  .about-portrait {
    width: 280px;
    flex-shrink: 0;
    aspect-ratio: 3/4;
    object-fit: cover;
    border-radius: 4px;
    opacity: 0.9;
  }

  .about-text { flex: 1; }
  .about-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }
  .about-text h2 {
    font-size: clamp(1.4rem, 2.2vw, 2rem);
    font-weight: 700;
    margin-bottom: 24px;
    line-height: 1.2;
  }

  .bio-para {
    font-size: 0.9rem;
    font-weight: 300;
    line-height: 1.8;
    color: rgba(255,255,255,0.7);
    margin-bottom: 14px;
    clip-path: inset(0 0 100% 0);
    transition: clip-path 0.65s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .bio-para.revealed { clip-path: inset(0 0 0% 0); }

  .about-awards {
    margin-top: 28px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    clip-path: inset(0 0 100% 0);
    transition: clip-path 0.65s cubic-bezier(0.25,0.46,0.45,0.94) 0.45s;
  }
  .about-awards.revealed { clip-path: inset(0 0 0% 0); }
  .award-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 5px 10px;
    border-radius: 2px;
  }

  /* SPOKESMAN MODAL */
  #spokesman-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #spokesman-modal.open { display: flex; }
  .modal-inner {
    position: relative;
    width: min(80vw, 900px);
  }
  .modal-inner video {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    background: #000;
    border-radius: 4px;
  }
  .modal-close {
    position: absolute;
    top: -44px;
    right: 0;
    background: none;
    border: none;
    color: #fff;
    font-size: 1.6rem;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .modal-close:hover { opacity: 1; }

  /* MOBILE */
  @media (max-width: 768px) {
    html, body { overflow: auto; height: auto; }
    .site-layout { flex-direction: column; height: auto; }
    .left-panel {
      position: sticky; top: 0; width: 100%; min-width: unset; height: auto;
      flex-direction: row; flex-wrap: wrap; align-items: center;
      padding: 14px 20px; gap: 12px;
      border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .name-block .first, .name-block .last { font-size: 1.4rem; }
    .left-nav, .spokesman-label, .spokesman-thumb, .left-footer { display: none; }
    .right-panel { margin-left: 0; height: auto; overflow: visible; }
    .cat-sticky-header { padding: 20px 20px 14px; }
    .cat-body { padding: 20px; }
    .about-section { padding: 40px 20px; }
    .about-inner { flex-direction: column; gap: 40px; }
    .about-portrait { width: 100%; }
  }
</style>
</head>
<body>

<nav class="opt-nav">
  <a href="option-24.html" class="opt-prev">&#8592;</a>
  <span class="opt-label">25 / 45 &mdash; VIDEOMANAGER</span>
  <a href="option-26.html" class="opt-next">&#8594;</a>
</nav>

<div class="site-layout">

  <!-- LEFT PANEL -->
  <aside class="left-panel">
    <div class="name-block">
      <div class="first">JONAH</div>
      <div class="last">OSKOW</div>
    </div>
    <div class="role">Film &amp; Commercial Editor</div>
    <a class="email-link" href="mailto:joskows@gmail.com">joskows@gmail.com</a>

    <nav class="left-nav" id="left-nav">
      <!-- populated by JS -->
    </nav>

    <div class="spokesman-label">Get Up To Speed</div>
    <div class="spokesman-thumb" id="spokesman-thumb" role="button" tabindex="0">
      <img src="https://highly-appropriate.b-cdn.net/portraits/jonah.jpg" alt="Jonah Oskow">
      <div class="play-circle">
        <svg viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="23" stroke="white" stroke-width="1.5" fill="rgba(0,0,0,0.4)"/>
          <polygon points="20,15 34,24 20,33" fill="white"/>
        </svg>

      COMEDY CENTRAL · NETFLIX<br>
      IDRIS ELBA · PETE DAVIDSON<br>
      JAMIE LEE CURTIS
    </div>
  </aside>

  <!-- RIGHT PANEL (scrollable) -->
  <div class="right-panel" id="right-panel">
    <!-- Category sections populated by JS -->
    <!-- About section appended by JS -->
  </div>

</div>

<!-- SPOKESMAN MODAL -->
<div id="spokesman-modal" role="dialog" aria-modal="true">
  <div class="modal-inner">
    <button class="modal-close" id="modal-close">×</button>
    <video id="spokesman-video" controls playsinline src="https://highly-appropriate.b-cdn.net/WeAreJonah_0305.mp4"></video>
  </div>
</div>

<script>
const VM = {
  current: null,
  play(el) {
    if (this.current && this.current !== el) {
      this.current.pause();
      this.current.currentTime = 0;
    }
    this.current = el;
  },
  stop() {
    if (this.current) {
      this.current.pause();
      this.current.currentTime = 0;
      this.current = null;
    }
  }
};

const CATEGORIES = [
  {
    id: 'comedy',
    label: 'Comedy',
    works: [
      'Mountain Dew "Kickstart"', 'Tide "Miracle Clothes"', 'Old Spice "Horse"',
      'Pizza Hut "Stuffed"', 'Pepsi "Live For Now"', 'Snickers "You\'re Not You"'
    ]
  },
  {
    id: 'social',
    label: 'Social Media',
    works: [
      'Charmin "Bears"', 'E*TRADE "Baby"', 'Geico "Hump Day"',
      'Bud Light "Dilly Dilly"', 'Progressive "Flo"', 'Dollar Shave Club'
    ]
  },
  {
    id: 'film',
    label: 'Film / Episodic',
    works: [
      'Netflix "Stranger Promos"', 'Comedy Central Rebrand', 'SNL Digital Short',
      'Adult Swim "Off the Air"', 'Hulu Original Cut', 'Amazon "Making The Cut"'
    ]
  },
  {
    id: 'ai',
    label: 'AI Direction',
    works: [
      'AI Campaign "Next Self"', 'Synthetic Spot "FutureCo"', 'DeepBrand "Launch"',
      'Generative Film "Echo"', 'LLM Director Cut', 'Neural Reel 2025'
    ]
  }
];

const WORK_SRC = 'https://highly-appropriate.b-cdn.net/HA%20reel/individualshots/BGReel.mp4';

const rightPanel = document.getElementById('right-panel');
const leftNav = document.getElementById('left-nav');

// Store references
const sectionEls = [];
const videoEls = [];
const overlayEls = [];
const leftNavLinks = [];

CATEGORIES.forEach((cat, catIdx) => {
  // LEFT NAV LINK
  const navLink = document.createElement('a');
  navLink.className = 'left-nav-link';
  navLink.textContent = cat.label;
  navLink.href = '#cat-' + cat.id;
  navLink.addEventListener('click', e => {
    e.preventDefault();
    const sec = sectionEls[catIdx];
    sec.scrollIntoView({ behavior: 'smooth' });
  });
  leftNav.appendChild(navLink);
  leftNavLinks.push(navLink);

  // SECTION
  const section = document.createElement('section');
  section.className = 'cat-section';
  section.id = 'cat-' + cat.id;
  section.dataset.idx = catIdx;

  // STICKY HEADER
  const stickyHeader = document.createElement('div');
  stickyHeader.className = 'cat-sticky-header';
  stickyHeader.innerHTML = `
    <span class="cat-index-num">0${catIdx + 1}</span>
    <span class="cat-section-name">${cat.label}</span>
  `;
  section.appendChild(stickyHeader);

  // BODY
  const catBody = document.createElement('div');
  catBody.className = 'cat-body';

  // PLAYER
  const playerWrap = document.createElement('div');
  playerWrap.className = 'section-player-wrap';

  const video = document.createElement('video');
  video.className = 'section-video';
  video.controls = true;
  video.playsInline = true;
  videoEls.push(video);

  const overlay = document.createElement('div');
  overlay.className = 'section-player-overlay';
  overlay.innerHTML = `<div class="ov-arrow">↓</div><p>Select from strip below</p>`;
  overlayEls.push(overlay);

  playerWrap.appendChild(video);
  playerWrap.appendChild(overlay);
  catBody.appendChild(playerWrap);

  // STRIP
  const strip = document.createElement('div');
  strip.className = 'thumb-strip';

  cat.works.forEach((title, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'strip-thumb';
    thumb.innerHTML = `
      <div class="strip-thumb-play">
        <svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <span class="strip-thumb-num">${String(catIdx * 6 + i + 1).padStart(2,'0')}</span>
    `;
    thumb.title = title;

    thumb.addEventListener('click', () => {
      // Deselect all thumbs in this strip
      strip.querySelectorAll('.strip-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');

      // Load and play this section's video
      video.src = WORK_SRC;
      overlay.classList.add('hidden');

      VM.play(video);
      video.play().catch(() => {});
    });

    strip.appendChild(thumb);
  });

  catBody.appendChild(strip);
  section.appendChild(catBody);
  rightPanel.appendChild(section);
  sectionEls.push(section);
});

// ABOUT SECTION
const aboutSection = document.createElement('section');
aboutSection.className = 'about-section';
aboutSection.id = 'about';
aboutSection.innerHTML = `
  <div class="about-inner">
    <img class="about-portrait" id="about-portrait" src="https://highly-appropriate.b-cdn.net/portraits/jonah.jpg" alt="Jonah Oskow">
    <div class="about-text">
      <div class="about-label">About</div>
      <h2>Comedy editor.<br>NYC commercial roots.</h2>
      <p class="bio-para">Jonah Oskow is a film and commercial editor with deep roots in New York's advertising world. His work spans comedy, narrative, and brand storytelling — always with a sharp eye for timing and rhythm.</p>
      <p class="bio-para">Award winner at Cannes Lions, the Clios, and the One Show. Featured work on Comedy Central and Netflix. Collaborated with Idris Elba, Pete Davidson, and Jamie Lee Curtis.</p>
      <p class="bio-para">Available for commercial, episodic, and branded content projects. Based in NYC, working globally.</p>
      <div class="about-awards">
        <span class="award-tag">CANNES LIONS</span>
        <span class="award-tag">CLIOS</span>
        <span class="award-tag">ONE SHOW</span>
        <span class="award-tag">COMEDY CENTRAL</span>
        <span class="award-tag">NETFLIX</span>
      </div>
    </div>
  </div>
`;
rightPanel.appendChild(aboutSection);

// ─── INTERSECTIONOBSERVER: CATEGORY ACTIVE STATE ─────────────
// Uses the right panel as scroll container
const catObs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const idx = parseInt(entry.target.dataset.idx);
    if (entry.isIntersecting) {
      // Activate this category in left nav
      leftNavLinks.forEach((l, i) => l.classList.toggle('active', i === idx));
      sectionEls.forEach((s, i) => s.classList.toggle('in-view', i === idx));
    }
  });
}, {
  root: rightPanel,
  threshold: 0.4
});

sectionEls.forEach(s => catObs.observe(s));

// ─── INTERSECTIONOBSERVER: ABOUT BIO WIPE ────────────────────
const aboutObs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const paras = aboutSection.querySelectorAll('.bio-para');
      const awards = aboutSection.querySelector('.about-awards');
      paras.forEach((p, i) => {
        setTimeout(() => p.classList.add('revealed'), i * 150);
      });
      if (awards) setTimeout(() => awards.classList.add('revealed'), paras.length * 150 + 100);
    }
  });
}, { root: rightPanel, threshold: 0.2 });

aboutObs.observe(aboutSection);

// ─── SPOKESMAN MODAL ─────────────────────────────────────────
const spokeThumb = document.getElementById('spokesman-thumb');
const spokeModal = document.getElementById('spokesman-modal');
const spokeVideo = document.getElementById('spokesman-video');
const modalClose = document.getElementById('modal-close');

function openModal() {
  spokeModal.classList.add('open');
  VM.play(spokeVideo);
  spokeVideo.play().catch(() => {});
}
function closeModal() {
  VM.stop();
  spokeModal.classList.remove('open');
}
spokeThumb.addEventListener('click', openModal);
spokeThumb.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(); });
modalClose.addEventListener('click', closeModal);
spokeModal.addEventListener('click', e => { if (e.target === spokeModal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init first nav link as active
